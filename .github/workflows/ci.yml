name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: build
        run: cargo build --bin attestation-service
      - name: verify bundled real tdx + nitro quotes (offline)
        run: cargo test --test verify_fixtures -- --nocapture

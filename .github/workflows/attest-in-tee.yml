name: attest-in-tee

# Build attestation-service INSIDE the Azure SEV-SNP confidential VM (a
# self-hosted runner), produce GitHub build provenance for the artifact, and
# bind the same artifact digest into the AMD-rooted vTPM AK quote that the box
# serves. Two independent roots (Sigstore supply-chain + AMD hardware) meet at
# one value_x = sha256(attestation-service).

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/attest-in-tee.yml"

permissions:
  contents: write # publish the release asset others verify against
  id-token: write # OIDC identity for Sigstore/Fulcio
  attestations: write # build provenance
  actions: write # dispatch the Pages deploy after refreshing the badge

concurrency:
  group: attest-in-tee
  cancel-in-progress: false

jobs:
  build-and-bind:
    # The label set steers this onto the confidential VM, so the build host
    # itself is hardware-attested — not merely trusted because it is managed.
    runs-on: [self-hosted, sev-snp]
    steps:
      - uses: actions/checkout@v4

      - name: build attestation-service (in-TEE)
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          cargo build --release --bin attestation-service
          install -m 0755 target/release/attestation-service ./attestation-service

      - name: compute artifact digest (value_x)
        id: dig
        run: |
          D=$(sha256sum ./attestation-service | awk '{print $1}')
          echo "digest=$D" >> "$GITHUB_OUTPUT"
          echo "value_x = $D"

      - name: github build provenance (sigstore)
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ./attestation-service

      - name: bind value_x into Azure SEV-SNP hardware (vTPM AK quote)
        run: |
          UQ=/home/azureuser/unified-quote/target/release/uq
          VX='${{ steps.dig.outputs.digest }}'
          # Deploy the freshly attested artifact as the served workload.
          install -m 0755 ./attestation-service /home/azureuser/attestation-service
          # Capture an offline-verifiable bundle bound to this exact digest.
          ( cd /home/azureuser && sudo "$UQ" azure collect --value-x "$VX" -o azure-bundle.json )
          # Restart the live attested-TLS endpoint so its leaf cert binds the
          # same digest, then verify the channel + chain end-to-end.
          sudo systemctl restart uq-azure
          sleep 8
          "$UQ" azure check-tls https://localhost:8443/

      - name: publish artifact + hardware bundle (stable release)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: azure-tee-build
          name: attestation-service built in Azure SEV-SNP TEE
          body: |
            value_x (sha256) = ${{ steps.dig.outputs.digest }}

            Source commit ${{ github.sha }} was built inside an Azure SEV-SNP
            confidential VM. GitHub build provenance and the AMD-rooted vTPM AK
            quote both bind this exact digest.

            Verify the full chain (source -> silicon):
              gh attestation verify attestation-service --repo ${{ github.repository }}
              uq azure check-tls https://attest.secure.build:8443/   # value_x must equal the digest above
          files: |
            ./attestation-service
            /home/azureuser/azure-bundle.json
          fail_on_unmatched_files: true

      - name: refresh source->silicon pages badge
        run: |
          git config user.name "tee-runner"
          git config user.email "actions@users.noreply.github.com"
          git fetch origin main
          git checkout -B main origin/main
          mkdir -p docs/status
          cat > docs/status/s2s.json <<EOF
          {
            "value_x": "${{ steps.dig.outputs.digest }}",
            "commit": "${{ github.sha }}",
            "run_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "built_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "release": "azure-tee-build",
            "endpoint": "https://attest.secure.build:8443/",
            "transport": "attested-tls"
          }
          EOF
          git add docs/status/s2s.json
          git commit -m "pages: source->silicon digest ${GITHUB_SHA::7}" || { echo "no change"; exit 0; }
          for i in 1 2 3; do
            git pull --rebase origin main && git push origin HEAD:main && break || sleep $((i*3))
          done

      - name: redeploy pages with current badge
        # GITHUB_TOKEN pushes do not trigger workflows, so dispatch Pages
        # explicitly (workflow_dispatch is exempt from the recursion guard).
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${{ github.api_url }}/repos/${{ github.repository }}/actions/workflows/deploy-pages.yml/dispatches" \
            -d '{"ref":"main"}'
